<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <linearGradient id="silverH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="50%" stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
  </defs>

  <!-- Black card background -->
  <rect width="680" height="420" rx="20" fill="#000000"/>

  <!-- Logo group centered -->
  <g transform="translate(340, 160)">
    <!-- Diamond outline -->
    <polygon points="0,-88 72,0 0,72 -72,0" fill="none" stroke="url(#silver)" stroke-width="3"/>
    <!-- Roof peak -->
    <polyline points="-28,-54 0,-82 28,-54" fill="none" stroke="url(#silver)" stroke-width="3" stroke-linejoin="round"/>

    <!-- Left column -->
    <rect x="-22" y="-47" width="11" height="58" rx="1" fill="url(#silver)"/>
    <!-- Center column (taller) -->
    <rect x="-5.5" y="-58" width="11" height="70" rx="1" fill="url(#silver)"/>
    <!-- Right column -->
    <rect x="11" y="-47" width="11" height="58" rx="1" fill="url(#silver)"/>

    <!-- Bottom foot -->
    <polyline points="-14,72 0,90 14,72" fill="none" stroke="url(#silver)" stroke-width="3" stroke-linejoin="round"/>

    <!-- Left wing -->
    <line x1="-72" y1="0" x2="-90" y2="0" stroke="url(#silver)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-72" y1="0" x2="-60" y2="-14" stroke="url(#silver)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-72" y1="0" x2="-60" y2="14" stroke="url(#silver)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Right wing -->
    <line x1="72" y1="0" x2="90" y2="0" stroke="url(#silver)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="72" y1="0" x2="60" y2="-14" stroke="url(#silver)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="72" y1="0" x2="60" y2="14" stroke="url(#silver)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Main title -->
  <text x="340" y="292" text-anchor="middle"
        font-family="'Times New Roman', Georgia, serif"
        font-size="38" font-weight="700"
        letter-spacing="8"
        fill="url(#silver)">EAGLE INVEST</text>

  <!-- Subtitle -->
  <text x="340" y="320" text-anchor="middle"
        font-family="'Times New Roman', Georgia, serif"
        font-size="15" font-weight="400"
        letter-spacing="7"
        fill="url(#silverH)">REAL ESTATE</text>

  <!-- Decorative lines -->
  <line x1="198" y1="333" x2="308" y2="333" stroke="url(#silverH)" stroke-width="0.6"/>
  <line x1="372" y1="333" x2="482" y2="333" stroke="url(#silverH)" stroke-width="0.6"/>
</svg>
